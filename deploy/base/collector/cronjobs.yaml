apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-monitor-report-daily
  namespace: monitoring
spec:
  schedule: "0 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: k8s-monitor-sa
          restartPolicy: OnFailure
          containers:
            - name: reporter
              image: harbor.osci.kr/k8s-monitor/collector:latest
              env:
                - name: COLLECTOR_MODE
                  value: report
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: k8s-monitor-db-secret
                      key: DATABASE_URL
              command: ["python", "-c", "import asyncio; from reports.generator import ReportGenerator; from db.pool import get_pool; asyncio.run(ReportGenerator(asyncio.run(get_pool())).generate('daily','playcekube',['html','json']))"]
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-monitor-predict
  namespace: monitoring
spec:
  schedule: "30 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: k8s-monitor-sa
          restartPolicy: OnFailure
          containers:
            - name: predictor
              image: harbor.osci.kr/k8s-monitor/collector:latest
              env:
                - name: COLLECTOR_MODE
                  value: predict
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: k8s-monitor-db-secret
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
