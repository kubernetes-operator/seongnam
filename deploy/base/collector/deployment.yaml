        - name: collector
          image: harbor.osci.kr/k8s-monitor/collector:latest
          env:
            - name: COLLECTOR_MODE
              value: k8s
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-db-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
