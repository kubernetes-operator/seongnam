name: CD

on:
  push:
    branches: [main]

env:
  HARBOR_REGISTRY: harbor.osci.kr
  IMAGE_PREFIX:    harbor.osci.kr/k8s-monitor

jobs:
  build-and-push:
    name: Build & Push to Harbor
    runs-on: arc-runner-set
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/api:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/api:latest
          cache-to:   type=inline

      - name: Build & Push Collector
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.collector
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/collector:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/collector:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/collector:latest
          cache-to:   type=inline

      - name: Build & Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dashboard:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/dashboard:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/dashboard:latest
          cache-to:   type=inline

      - name: Trivy 취약점 스캔
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/api:${{ steps.tag.outputs.tag }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  update-kustomize-tag:
    name: Update Kustomize Image Tag
    runs-on: arc-runner-set
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tags in kustomization.yaml
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          cd deploy/overlays/prod
          # newTag 값을 새 커밋 SHA로 교체
          sed -i "s|newTag: .*|newTag: \"${TAG}\"|g" kustomization.yaml

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/prod/kustomization.yaml
          git diff --cached --quiet || git commit -m "chore: update image tag to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
