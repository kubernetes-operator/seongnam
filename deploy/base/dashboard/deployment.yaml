apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-monitor-dashboard
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-monitor-dashboard
  template:
    metadata:
      labels:
        app: k8s-monitor-dashboard
    spec:
      containers:
        - name: dashboard
          image: harbor.osci.kr/k8s-monitor/dashboard:latest
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: ""
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-monitor-dashboard
  namespace: monitoring
spec:
  selector:
    app: k8s-monitor-dashboard
  ports:
    - port: 80
      targetPort: 80
