apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-monitor-api
  namespace: monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-monitor-api
  template:
    metadata:
      labels:
        app: k8s-monitor-api
    spec:
      serviceAccountName: k8s-monitor-sa
      hostAliases:
        - ip: "192.168.77.100"
          hostnames: ["registry.local.cloud"]
      containers:
        - name: api
          image: registry.local.cloud:5000/k8s-monitor/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-db-secret
                  key: DATABASE_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-api-secret
                  key: API_KEY
          volumeMounts:
            - name: reports
              mountPath: /reports
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: reports
          emptyDir: {}
